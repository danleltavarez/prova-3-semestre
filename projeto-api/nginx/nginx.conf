# API de Gestão de Cursos e Matrículas
Sistema de APIs REST para gestão de cursos, alunos e matrículas escolares.
## 📋 Descrição
Esta API permite o gerenciamento completo de:
- **Usuários** - Cadastro e autenticação de administradores
- **Alunos** - Cadastro e gerenciamento de estudantes
- **Cursos** - Cadastro e gerenciamento de cursos
- **Matrículas** - Vinculação de alunos a cursos (relação N:N)
## 🗃️ Entidades, Tabelas e Relacionamentos
### Tabelas do Banco de Dados
| Tabela | Descrição |
|--------|-----------|
| `users` | Usuários do sistema (administradores) |
| `students` | Alunos cadastrados |
| `courses` | Cursos disponíveis |
| `enrollments` | **Tabela Pivô** - Matrículas (relação N:N entre alunos e cursos) |
### Relacionamentos
Students ←──────→ Courses N:N (através de Enrollments)



- **Relação N:N**: Um aluno pode estar matriculado em vários cursos, e um curso pode ter vários alunos matriculados.
- **Tabela Pivô**: `enrollments` é a tabela pivô que conecta `students` e `courses`, contendo atributos adicionais como `status`, `grade` e `enrollment_date`.
### Diagrama ER
┌─────────────┐ ┌───────────────┐ ┌─────────────┐ │ USERS │ │ ENROLLMENTS │ │ COURSES │ ├─────────────┤ ├───────────────┤ ├─────────────┤ │ id (PK) │ │ id (PK) │ │ id (PK) │ │ name │ │ student_id(FK)│───────│ name │ │ email (UK) │ │ course_id (FK)│ │ description │ │ password │ │ enrollment_dt │ │ workload │ │ created_at │ │ status │ │ price │ │ updated_at │ │ grade │ │ active │ └─────────────┘ │ created_at │ │ created_at │ │ updated_at │ │ updated_at │ ┌─────────────┐ └───────────────┘ └─────────────┘ │ STUDENTS │ │ ├─────────────┤ │ │ id (PK) │──────────────┘ │ name │ │ email (UK) │ │ cpf (UK) │ │ birth_date │ │ phone │ │ created_at │ │ updated_at │ └─────────────┘



## 🛠️ CRUD das Entidades
### Usuários (`/api/users`)
| Método | Rota | Descrição |
|--------|------|-----------|
| GET | `/api/users` | Lista todos os usuários |
| GET | `/api/users/:id` | Busca usuário por ID |
| POST | `/api/users` | Cria novo usuário |
| PUT | `/api/users/:id` | Atualiza usuário |
| DELETE | `/api/users/:id` | Remove usuário |
### Alunos (`/api/students`)
| Método | Rota | Descrição |
|--------|------|-----------|
| GET | `/api/students` | Lista todos os alunos |
| GET | `/api/students/:id` | Busca aluno por ID |
| POST | `/api/students` | Cria novo aluno |
| PUT | `/api/students/:id` | Atualiza aluno |
| DELETE | `/api/students/:id` | Remove aluno |
### Cursos (`/api/courses`)
| Método | Rota | Descrição |
|--------|------|-----------|
| GET | `/api/courses` | Lista todos os cursos |
| GET | `/api/courses/:id` | Busca curso por ID |
| POST | `/api/courses` | Cria novo curso |
| PUT | `/api/courses/:id` | Atualiza curso |
| DELETE | `/api/courses/:id` | Remove curso |
### Matrículas (`/api/enrollments`) - Tabela Pivô
| Método | Rota | Descrição |
|--------|------|-----------|
| GET | `/api/enrollments` | Lista todas as matrículas |
| GET | `/api/enrollments/:id` | Busca matrícula por ID |
| POST | `/api/enrollments` | Cria nova matrícula (vincula aluno a curso) |
| PUT | `/api/enrollments/:id` | Atualiza matrícula (status, nota) |
| DELETE | `/api/enrollments/:id` | Remove matrícula |
## 🐳 Containers Docker
| Container | Imagem | Porta | Descrição |
|-----------|--------|-------|-----------|
| `nginx_proxy` | nginx:alpine | 80 | Proxy reverso (acesso externo) |
| `node_api` | node:24-alpine | 3000 (interna) | Servidor da API |
| `postgres_db` | postgres:17 | 5432 (interna) | Banco de dados |
### Arquitetura
Host (porta 80) → Nginx → Node.js API → PostgreSQL



O servidor Node.js **não é acessível diretamente** pelo host. Todo acesso passa pelo Nginx.
## 📚 Bibliotecas Utilizadas
| Biblioteca | Versão | Descrição |
|------------|--------|-----------|
| express | ^4.21.0 | Framework web |
| sequelize | ^6.37.0 | ORM para PostgreSQL |
| pg | ^8.13.0 | Driver PostgreSQL |
| bcrypt | ^5.1.1 | Criptografia de senhas |
| jsonwebtoken | ^9.0.2 | Autenticação JWT |
| swagger-jsdoc | ^6.2.8 | Geração de documentação |
| swagger-ui-express | ^5.0.1 | Interface Swagger |
| cors | ^2.8.5 | Cross-Origin Resource Sharing |
| dotenv | ^16.4.5 | Variáveis de ambiente |
