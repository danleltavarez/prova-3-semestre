}
Resposta
json


{
  "user": {
    "id": 1,
    "name": "Administrador",
    "email": "admin@escola.com"
  },
  "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
}
Usar o Token
Adicione o header Authorization em todas as requisições protegidas:



Authorization: Bearer <seu_token_aqui>
Exemplo com cURL:

bash


curl -X GET [localhost](http://localhost/api/students) \
  -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
📖 Documentação Swagger
A documentação interativa da API está disponível em:



[localhost](http://localhost/api-docs)
🚀 Como Executar o Projeto
Pré-requisitos
Docker
Docker Compose
Execução
Clone ou baixe o projeto
Execute o Docker Compose:
bash


docker compose up --build
Aguarde todos os containers iniciarem. Você verá:


✅ Conexão com o banco de dados estabelecida com sucesso.
🚀 Servidor rodando na porta 3000
Acesse a documentação Swagger:


[localhost](http://localhost/api-docs)
Parar a execução
bash


docker compose down
Remover volumes (limpar banco de dados)
bash


docker compose down -v
🔧 Executar Migrations
As migrations são executadas automaticamente ao iniciar o container. Para executar manualmente:

bash


# Acessar o container da API
docker exec -it node_api sh
# Executar migrations
node command.js migrate
# Executar seeds (dados iniciais)
node command.js seed
Ou diretamente:

bash


docker exec node_api node command.js migrate
📝 Exemplos de Requisições
Criar Aluno
bash


curl -X POST [localhost](http://localhost/api/students) \
  -H "Authorization: Bearer <token>" \
  -H "Content-Type: application/json" \
  -d '{
    "name": "João Silva",
    "email": "joao@email.com",
    "cpf": "123.456.789-00",
    "birthDate": "2000-05-15",
    "phone": "(11) 99999-9999"
  }'
Criar Curso
bash


curl -X POST [localhost](http://localhost/api/courses) \
  -H "Authorization: Bearer <token>" \
  -H "Content-Type: application/json" \
  -d '{
    "name": "Desenvolvimento Web",
    "description": "Curso completo de HTML, CSS, JS e Node.js",
    "workload": 120,
    "price": 1500.00
  }'
Matricular Aluno em Curso
bash


curl -X POST [localhost](http://localhost/api/enrollments) \
  -H "Authorization: Bearer <token>" \
  -H "Content-Type: application/json" \
  -d '{
    "studentId": 1,
    "courseId": 1
  }'
Atualizar Nota da Matrícula
bash


curl -X PUT [localhost](http://localhost/api/enrollments/1) \
  -H "Authorization: Bearer <token>" \
  -H "Content-Type: application/json" \
  -d '{
    "grade": 8.5,
    "status": "completed"
  }'
